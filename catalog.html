<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог — Мастера лозы</title>
  <meta name="description" content="Каталог изделий ручной работы из лозы: корзины, декор, элементы мебели." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">Мастера лозы</a>
      <button class="nav-toggle" aria-label="Открыть меню" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Основная навигация">
        <ul>
          <li><a href="/">Главная</a></li>
          <li><a href="/catalog.html">Каталог</a></li>
          <li><a href="/about.html">О нас</a></li>
          <li><a href="/blog/">Блог</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ==================== MAIN ==================== -->
  <main>

    <div class="page-header">
      <div class="container">
        <h1>Каталог</h1>
        <p>Изделия ручной работы из лозы</p>
      </div>
    </div>

    <!-- ==================== CATALOG ==================== -->
    <section class="catalog-section section">
      <div class="container">

        <!-- Category filter tabs -->
        <div class="filter-tabs" role="tablist" aria-label="Категории товаров">
          <button class="filter-tab is-active" data-filter="all"       role="tab" aria-selected="true">Все</button>
          <button class="filter-tab"            data-filter="baskets"  role="tab" aria-selected="false">Корзины</button>
          <button class="filter-tab"            data-filter="decor"    role="tab" aria-selected="false">Декор</button>
          <button class="filter-tab"            data-filter="furniture"role="tab" aria-selected="false">Мебель</button>
        </div>

        <!-- Product grid -->
        <!--
          Each card has data-category matching a filter tab value.
          To make an item display-only (not orderable), simply omit the <button class="order-btn"> element.
          Placeholder images: place photos in /images/products/ with matching filenames.
        -->
        <!-- Cards are rendered by /js/catalog.js from /data/products.json -->
        <div class="product-grid" id="product-grid"></div>
      </div>
    </section>

  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <a href="/" class="site-logo">Мастера лозы</a>
          <p>Изделия ручной работы из лозы. Корзины, декор, элементы мебели.</p>
        </div>
        <div class="footer-contacts">
          <h4>Контакты</h4>
          <ul>
            <li><a href="tel:+70000000000">+7 (000) 000-00-00</a></li>
            <li><a href="mailto:info@example.ru">info@example.ru</a></li>
            <li><a href="#" target="_blank" rel="noopener">ВКонтакте</a></li>
            <li><a href="#" target="_blank" rel="noopener">Telegram</a></li>
          </ul>
        </div>
      </div>
      <p class="footer-bottom">&copy; 2025 Мастера лозы. Все права защищены.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
