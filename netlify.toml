[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Legacy .html URLs redirect to clean paths
[[redirects]]
  from = "/catalog.html"
  to   = "/catalog"
  status = 301

[[redirects]]
  from = "/about.html"
  to   = "/about"
  status = 301

[[redirects]]
  from = "/blog/:slug.html"
  to   = "/blog/:slug"
  status = 301

[[redirects]]
  from = "/blog"
  to   = "/blog/"
  status = 301

[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404
