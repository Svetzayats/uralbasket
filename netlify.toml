[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/blog"
  to   = "/blog/"
  status = 301

[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404
